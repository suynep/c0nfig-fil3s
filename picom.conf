opacity-rule = [
  "100:class_g = 'kitty' && focused",
  "80:class_g = 'kitty' && !focused",
  "100:class_g = 'Google-chrome' && focused",
  "90:class_g = 'Google-chrome' && !focused",
  "90:class_g = 'amberol' && !focused",
  "80:class_g = 'amberol' && focused",
  "98:class_g = 'Code' && focused",
  "93:class_g = 'Code' && !focused"
];

vsync = true;
